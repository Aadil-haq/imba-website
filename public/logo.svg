<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 590">
  <defs>

    <!-- Star: white radial gradient for subtle 3D depth -->
    <radialGradient id="starGrad" cx="42%" cy="28%" r="72%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="60%"  stop-color="#f2f4ff"/>
      <stop offset="100%" stop-color="#c0c8de"/>
    </radialGradient>

    <!-- Star inner vignette for 3D concave feel -->
    <radialGradient id="starVig" cx="50%" cy="52%" r="55%">
      <stop offset="0%"   stop-color="rgba(60,80,160,0.0)"/>
      <stop offset="100%" stop-color="rgba(20,30,90,0.18)"/>
    </radialGradient>

    <!-- Basketball sphere: highlight at top-left → deep blue at bottom-right -->
    <radialGradient id="ballGrad" cx="33%" cy="24%" r="74%">
      <stop offset="0%"   stop-color="#82dcff"/>
      <stop offset="22%"  stop-color="#4a9fe3"/>
      <stop offset="58%"  stop-color="#1e68c0"/>
      <stop offset="100%" stop-color="#0a2e6e"/>
    </radialGradient>

    <!-- Orbit front arc: top-lit tube -->
    <linearGradient id="orbitFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7fd0ff"/>
      <stop offset="40%"  stop-color="#4a9fe3"/>
      <stop offset="100%" stop-color="#1050a8"/>
    </linearGradient>

    <!-- Orbit back arc: darker, behind-ball -->
    <linearGradient id="orbitBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1a5aaa"/>
      <stop offset="100%" stop-color="#08204e"/>
    </linearGradient>

    <!-- IMBA text gradient: top-lit 3D blue -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#78d0ff"/>
      <stop offset="38%"  stop-color="#4a9fe3"/>
      <stop offset="100%" stop-color="#1050a8"/>
    </linearGradient>

    <!-- ============ FILTERS ============ -->

    <!-- Star drop shadow -->
    <filter id="fStar" x="-18%" y="-15%" width="136%" height="136%">
      <feDropShadow dx="0" dy="14" stdDeviation="14"
        flood-color="#000028" flood-opacity="0.60"/>
    </filter>

    <!-- Basketball drop shadow + ambient glow -->
    <filter id="fBall" x="-28%" y="-22%" width="156%" height="150%">
      <feDropShadow dx="5" dy="12" stdDeviation="12"
        flood-color="#001030" flood-opacity="0.75"/>
    </filter>

    <!-- Orbit shadow -->
    <filter id="fOrbit" x="-12%" y="-25%" width="124%" height="150%">
      <feDropShadow dx="2" dy="6" stdDeviation="6"
        flood-color="#001030" flood-opacity="0.55"/>
    </filter>

    <!-- Text 3D shadow -->
    <filter id="fText" x="-5%" y="-8%" width="116%" height="145%">
      <feDropShadow dx="3" dy="7" stdDeviation="4"
        flood-color="#060e22" flood-opacity="0.85"/>
    </filter>

  </defs>

  <!-- ===================== STAR ===================== -->
  <!-- Computed for cx=250, cy=222, OR=208, IR=85 -->
  <polygon
    points="250,14 299.8,152.8 448.2,157.4 332.4,247.6 374.1,391.4 250,308 125.9,391.4 167.6,247.6 51.8,157.4 200.2,152.8"
    fill="url(#starGrad)"
    stroke="#0e1428"
    stroke-width="5"
    stroke-linejoin="round"
    filter="url(#fStar)"
  />
  <!-- Inner vignette overlay for 3D concave effect -->
  <polygon
    points="250,14 299.8,152.8 448.2,157.4 332.4,247.6 374.1,391.4 250,308 125.9,391.4 167.6,247.6 51.8,157.4 200.2,152.8"
    fill="url(#starVig)"
  />

  <!-- ========== ORBIT RING — BACK (behind ball) ========== -->
  <!-- Bottom sweep; lower opacity to simulate depth behind the sphere -->
  <path
    d="M 138,208 C 152,242 195,262 250,258 C 305,262 348,242 362,208"
    fill="none"
    stroke="url(#orbitBack)"
    stroke-width="28"
    stroke-linecap="round"
    opacity="0.72"
  />
  <!-- Inner back-tube highlight -->
  <path
    d="M 142,206 C 156,237 196,255 250,251 C 304,255 344,237 358,206"
    fill="none"
    stroke="rgba(80,160,240,0.18)"
    stroke-width="10"
    stroke-linecap="round"
  />

  <!-- ===================== BASKETBALL ===================== -->
  <circle cx="250" cy="188" r="91"
    fill="url(#ballGrad)"
    stroke="#0a1a38"
    stroke-width="5.5"
    filter="url(#fBall)"
  />

  <!-- Seam lines (classic basketball pattern) -->
  <!-- Left vertical arc -->
  <path d="M 250,97 Q 222,148 222,188 Q 222,230 250,279"
    fill="none" stroke="#09182e" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Right vertical arc -->
  <path d="M 250,97 Q 278,148 278,188 Q 278,230 250,279"
    fill="none" stroke="#09182e" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Top horizontal arc -->
  <path d="M 163,172 Q 207,148 250,146 Q 293,148 337,172"
    fill="none" stroke="#09182e" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Bottom horizontal arc -->
  <path d="M 163,204 Q 207,228 250,230 Q 293,228 337,204"
    fill="none" stroke="#09182e" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Specular highlight — large soft blob -->
  <ellipse cx="222" cy="150" rx="26" ry="18"
    fill="white" opacity="0.28"
    transform="rotate(-22 222 150)"/>
  <!-- Specular highlight — small sharp core -->
  <ellipse cx="214" cy="142" rx="11" ry="8"
    fill="white" opacity="0.52"
    transform="rotate(-22 214 142)"/>

  <!-- ========== ORBIT RING — FRONT (in front of ball, with swoosh tip) ========== -->
  <!-- Main front arc -->
  <path
    d="M 132,174 C 160,140 204,126 250,124 C 296,126 340,140 378,164 L 412,148"
    fill="none"
    stroke="url(#orbitFront)"
    stroke-width="28"
    stroke-linecap="round"
    filter="url(#fOrbit)"
  />
  <!-- Tube top highlight (bright edge) -->
  <path
    d="M 138,170 C 164,139 206,127 250,125 C 294,127 336,139 372,162 L 404,147"
    fill="none"
    stroke="rgba(180,236,255,0.48)"
    stroke-width="9"
    stroke-linecap="round"
  />
  <!-- Tube bottom shadow (dark edge) -->
  <path
    d="M 133,182 C 161,150 205,136 250,134 C 295,136 338,150 375,172 L 408,158"
    fill="none"
    stroke="rgba(4,20,60,0.38)"
    stroke-width="9"
    stroke-linecap="round"
  />

  <!-- ===================== IMBA TEXT ===================== -->
  <text
    x="250" y="490"
    font-family="Impact, 'Arial Black', Arial, sans-serif"
    font-size="106"
    font-weight="900"
    text-anchor="middle"
    fill="url(#textGrad)"
    stroke="#08182e"
    stroke-width="4.5"
    filter="url(#fText)"
    letter-spacing="5"
  >IMBA</text>

</svg>
